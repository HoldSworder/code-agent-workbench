name: vibecoding
description: >-
  轻量级 Vibecoding 工作流，适用于简单需求。
  跳过 Spec 落盘与任务拆分，拿到需求后直接进入代码开发，
  经过联调与 Review 后推送发布。

dependencies:
  superpowers:
    type: skill-pack
    skills:
      verification-before-completion: superpowers:verification-before-completion

gate_definitions:
  working_tree_clean:
    description: Git 工作区干净（无未提交的修改和暂存）
    checks:
      - type: command_succeeds
        command: "git diff --quiet && git diff --cached --quiet"

  has_feature_branch:
    description: 当前不在主干分支上（已创建 feature 分支）
    checks:
      - type: command_succeeds
        command: "test \"$(git branch --show-current)\" != 'main' && test \"$(git branch --show-current)\" != 'master'"

  has_committed_changes:
    description: feature 分支上有相对于主干的提交
    checks:
      - type: command_succeeds
        command: "test $(git rev-list --count HEAD ^$(git merge-base HEAD origin/$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}'))) -gt 0"

external_rules:
  - id: lark-cli-only
    path: ../shared/rules/lark-cli-only.md
    description: 飞书文档操作必须使用 lark-cli

guardrail_definitions:
  no_uncommitted_claim:
    description: >-
      【不在未验证时声称完成】不得在没有运行验证命令的情况下声称任务完成。
    severity: soft

state_inference:
  rules:
    - condition: working_tree_clean
      stage: development
      phase: create-branch
      description: 工作区干净 → 创建 feature 分支

    - condition: has_committed_changes
      stage: development
      phase: review
      description: 已有提交 → 代码 Review

    - condition: has_feature_branch
      stage: development
      phase: dev
      description: 已在 feature 分支 → 继续开发

stages:
  # ──────────────────────────────────────────────
  # Stage 1: 代码开发
  # ──────────────────────────────────────────────
  - id: development
    name: 代码开发
    phases:
      - id: create-branch
        name: 创建分支
        provider: external-cli
        skill: skills/create-branch.md
        entry_gate: working_tree_clean

      - id: dev
        name: 开发
        provider: external-cli
        skill: skills/dev.md
        guardrails:
          - no_uncommitted_claim

      - id: integration
        name: 联调
        provider: external-cli
        skill: skills/integration.md
        optional: true
        requires_confirm: true
        completion_check: working_tree_clean
        triggers:
          - "后端spec到了"
          - "联调"
          - "API文档到了"
          - "后端接口文档来了"

      - id: review
        name: 代码 Review
        provider: external-cli
        skill: skills/review.md
        requires_confirm: true

  # ──────────────────────────────────────────────
  # Stage 2: 上线
  # ──────────────────────────────────────────────
  - id: release
    name: 上线
    phases:
      - id: deploy
        name: 发布
        provider: external-cli
        skill: skills/deploy.md
        requires_confirm: true
        is_terminal: true


trigger_mapping:
  - patterns: ["开始开发", "直接开发", "做个简单需求", "vibecoding"]
    target_stage: development
    target_phase: dev

  - patterns: ["继续开发", "接着做", "继续这个需求"]
    target_stage: auto
    target_phase: auto
    strategy: infer_from_state

  - patterns: ["后端spec", "后端接口文档", "API文档", "联调"]
    target_stage: development
    target_phase: integration

  - patterns: ["发布", "提MR", "push", "上线"]
    target_stage: release
    target_phase: deploy
